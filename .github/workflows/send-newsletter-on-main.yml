name: Send Newsletter On Main

on:
  push:
    branches:
      - main
    paths:
      - 'content/blog/published/**'
  workflow_dispatch:

jobs:
  trigger-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect newly published digest
        id: detect_digest
        shell: bash
        run: |
          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"

          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-parse "${HEAD_SHA}^" 2>/dev/null || true)"
          fi

          if [ -z "$BASE_SHA" ]; then
            echo "should_send=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ADDED_DIGEST_FILE="$(git diff --name-status "$BASE_SHA" "$HEAD_SHA" \
            | awk '$1 == "A" {print $2}' \
            | grep -m 1 -E '^content/blog/published/[0-9]{4}-[0-9]{2}-[0-9]{2}-tech-digest\.md$' \
            || true)"

          if [ -z "$ADDED_DIGEST_FILE" ]; then
            echo "should_send=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DIGEST_SLUG="$(basename "$ADDED_DIGEST_FILE" .md)"
          echo "should_send=true" >> "$GITHUB_OUTPUT"
          echo "slug=$DIGEST_SLUG" >> "$GITHUB_OUTPUT"

      - name: Wait for production deploy
        if: steps.detect_digest.outputs.should_send == 'true'
        run: sleep 180

      - name: Trigger newsletter dispatch
        if: steps.detect_digest.outputs.should_send == 'true'
        env:
          NEWSLETTER_TRIGGER_URL: ${{ secrets.NEWSLETTER_TRIGGER_URL }}
          NEWSLETTER_DISPATCH_SECRET: ${{ secrets.NEWSLETTER_DISPATCH_SECRET }}
          DIGEST_SLUG: ${{ steps.detect_digest.outputs.slug }}
        run: |
          curl --fail-with-body \
            -X POST \
            -H "Authorization: Bearer ${NEWSLETTER_DISPATCH_SECRET}" \
            "${NEWSLETTER_TRIGGER_URL}?slug=${DIGEST_SLUG}"
